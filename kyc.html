<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KYC Verification | HelpHand Global Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --accent: #64ffda; --bg: #0a192f; --panel: #112240; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: #e6f1ff; margin: 0; }
        .kyc-container { max-width: 600px; margin: 20px auto; background: var(--panel); padding: 25px; border-radius: 12px; border: 1px solid #233554; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: var(--accent); margin-bottom: 8px; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: #020c1b; border: 1px solid #233554; color: white; border-radius: 6px; outline: none; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(100, 255, 218, 0.2); }
        .warning-box { background: rgba(246, 70, 93, 0.1); border: 1px solid #f6465d; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .warning-box p { margin: 0; color: #f6465d; font-size: 11px; line-height: 1.5; font-weight: 500; }
        .step-indicator { text-align: center; color: #8892b0; font-size: 11px; margin-bottom: 20px; letter-spacing: 2px; font-weight: bold; }
        .main-btn { background: var(--accent); color: #0a192f; font-weight: 800; padding: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; width: 100%; border:none; text-transform: uppercase; font-size: 14px; margin-top: 10px; }
        .main-btn:active { transform: scale(0.98); }
        .main-btn:disabled { background: #233554; color: #8892b0; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="auth-bar" style="background:#020c1b; color:var(--accent); padding:10px; font-size:10px; text-align:center; border-bottom:1px solid #233554;">
        <span><i class="fas fa-shield-alt"></i> SECURE 256-BIT ENCRYPTION ACTIVE</span>
    </div>

    <div class="kyc-container">
        <div class="step-indicator">STEP 1: IDENTITY & BANK AUDIT</div>
        
        <div class="warning-box">
            <p><strong>SECURITY ALERT:</strong> Aapka KYC data Government database se match hona chahiye. Fake details daalne par system automatically account "Blacklist" kar dega.</p>
        </div>

        <form id="kycForm">
            <div class="form-group">
                <label>FULL NAME (As per Bank/Aadhaar)</label>
                <input type="text" id="fullName" placeholder="Enter Full Name" required minlength="3">
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>FATHER'S NAME</label>
                    <input type="text" id="fatherName" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>MOTHER'S NAME</label>
                    <input type="text" id="motherName" required>
                </div>
            </div>

            <div class="form-group">
                <label>PAN CARD NUMBER (10 Characters)</label>
                <input type="text" id="panNo" maxlength="10" placeholder="ABCDE1234F" pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}" style="text-transform: uppercase;" required>
            </div>

            <div class="form-group">
                <label>AADHAAR NUMBER (12 Digits)</label>
                <input type="text" id="aadhaarNo" maxlength="12" pattern="[0-9]{12}" inputmode="numeric" placeholder="000000000000" required>
            </div>

            <div class="form-group">
                <label>BANK ACCOUNT NUMBER</label>
                <input type="text" id="accNo" inputmode="numeric" required placeholder="Enter Account Number">
            </div>

            <div class="form-group">
                <label>IFSC CODE</label>
                <input type="text" id="ifscCode" maxlength="11" pattern="^[A-Z]{4}0[A-Z0-9]{6}$" style="text-transform: uppercase;" placeholder="SBIN0012345" required>
            </div>

            <button type="submit" id="submitBtn" class="main-btn">VERIFY & PROCEED</button>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCxgc_NttnhW4weri20wnuC98xgMDHTD9k",
            authDomain: "helphandglobal.firebaseapp.com",
            projectId: "helphandglobal",
            storageBucket: "helphandglobal.firebasestorage.app",
            messagingSenderId: "286256403331",
            appId: "1:286256403331:web:8f8eea05d8db9bba25dcb6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                if(!document.getElementById('fullName').value) {
                    document.getElementById('fullName').value = user.displayName || "";
                }
            } else {
                window.location.href = 'index.html'; 
            }
        });

        document.getElementById('kycForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> VERIFYING...';
            btn.disabled = true;

            const userData = {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                name: document.getElementById('fullName').value,
                father: document.getElementById('fatherName').value,
                mother: document.getElementById('motherName').value,
                pan: document.getElementById('panNo').value.toUpperCase(),
                aadhaar: document.getElementById('aadhaarNo').value,
                acc: document.getElementById('accNo').value,
                ifsc: document.getElementById('ifscCode').value.toUpperCase(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // Save to Firestore
                await db.collection("investor_kyc").doc(auth.currentUser.uid).set(userData);
                // Save to LocalStorage for Payment/Bond page
                localStorage.setItem('hhg_user', JSON.stringify(userData));
                
                window.location.href = 'dashboard.html'; // Yahan apne payment page ka naam likhna
            } catch (error) {
                alert("Database Error: " + error.message);
                btn.innerHTML = 'VERIFY & PROCEED';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
