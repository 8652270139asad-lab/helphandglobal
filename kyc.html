<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KYC Verification | HelpHand Global Official</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root { 
            --neon-blue: #00f2ff; 
            --dark-bg: #010409; 
            --panel-bg: rgba(6, 15, 25, 0.95); 
            --border-glow: rgba(0, 242, 255, 0.2);
        }

        body, html { 
            background: var(--dark-bg); 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            color: white; 
            margin: 0; 
            overflow-x: hidden;
            height: 100%;
        }

        /* SYSTEM CREATION BACKGROUND ANIMATION */
        #identity-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
            opacity: 0.3; pointer-events: none;
        }

        .auth-bar {
            background: rgba(2, 12, 27, 0.8);
            color: var(--neon-blue);
            padding: 12px;
            font-size: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border-glow);
            letter-spacing: 2px;
            position: relative; z-index: 10;
        }

        .kyc-container { 
            max-width: 550px; 
            margin: 40px auto; 
            background: var(--panel-bg); 
            padding: 40px; 
            border-radius: 4px; 
            border: 1px solid var(--border-glow); 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative; z-index: 10;
            backdrop-filter: blur(15px);
        }

        /* Robotic Corners */
        .kyc-container::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 25px; height: 25px;
            border-top: 3px solid var(--neon-blue); border-left: 3px solid var(--neon-blue);
        }

        .step-indicator { 
            text-align: center; color: var(--neon-blue); 
            font-size: 11px; margin-bottom: 25px; 
            letter-spacing: 3px; font-weight: bold;
            text-transform: uppercase;
        }

        .warning-box { 
            background: rgba(246, 70, 93, 0.05); 
            border-left: 3px solid #f6465d; 
            padding: 15px; margin-bottom: 30px; 
        }
        .warning-box p { margin: 0; color: #f6465d; font-size: 11px; line-height: 1.6; }

        .form-group { margin-bottom: 22px; }
        label { 
            display: block; color: #8892b0; margin-bottom: 8px; 
            font-size: 10px; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 1.5px; 
        }
        
        input { 
            width: 100%; padding: 14px; 
            background: rgba(1, 4, 9, 0.8); 
            border: 1px solid #233554; 
            color: var(--neon-blue); 
            border-radius: 2px; outline: none; 
            box-sizing: border-box; font-size: 14px;
            transition: 0.3s;
        }
        input:focus { 
            border-color: var(--neon-blue); 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
            background: #010409;
        }

        .main-btn { 
            background: transparent; 
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue); 
            font-weight: bold; padding: 18px; 
            cursor: pointer; transition: 0.4s; 
            width: 100%; text-transform: uppercase; 
            font-size: 13px; margin-top: 20px;
            letter-spacing: 2px;
        }
        .main-btn:hover { 
            background: var(--neon-blue); 
            color: black; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }
        .main-btn:disabled { border-color: #233554; color: #495670; cursor: not-allowed; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>

    <canvas id="identity-canvas"></canvas>

    <div class="auth-bar">
        <i class="fas fa-fingerprint"></i> BIOMETRIC PROTOCOL: <span>ENCRYPTED V.2.06</span>
    </div>

    <div class="kyc-container">
        <div class="step-indicator">Identity Verification & Audit</div>
        
        <div class="warning-box">
            <p><strong>NOTICE:</strong> Aapka KYC data real-time mein Government database se verify kiya ja raha hai. Incorrect details par system automatic legal freeze trigger kar sakta hai.</p>
        </div>

        <form id="kycForm">
            <div class="form-group">
                <label>FULL NAME (LEGAL IDENTITY)</label>
                <input type="text" id="fullName" placeholder="Processing name..." required>
            </div>

            <div style="display: flex; gap: 15px;">
                <div class="form-group" style="flex: 1;">
                    <label>FATHER'S NAME</label>
                    <input type="text" id="fatherName" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>MOTHER'S NAME</label>
                    <input type="text" id="motherName" required>
                </div>
            </div>

            <div class="form-group">
                <label>PAN CARD ID (FEDERAL TAX)</label>
                <input type="text" id="panNo" maxlength="10" placeholder="ABCDE1234F" style="text-transform: uppercase;" required>
            </div>

            <div class="form-group">
                <label>AADHAAR ID (BIOMETRIC NUMBER)</label>
                <input type="text" id="aadhaarNo" maxlength="12" pattern="[0-9]{12}" inputmode="numeric" placeholder="0000 0000 0000" required>
            </div>

            <div class="form-group">
                <label>SETTLEMENT BANK ACCOUNT</label>
                <input type="text" id="accNo" inputmode="numeric" required placeholder="Enter primary account">
            </div>

            <div class="form-group">
                <label>IFSC ROUTING CODE</label>
                <input type="text" id="ifscCode" maxlength="11" pattern="^[A-Z]{4}0[A-Z0-9]{6}$" style="text-transform: uppercase;" placeholder="SBIN0012345" required>
            </div>

            <button type="submit" id="submitBtn" class="main-btn">AUTHENTICATE & PROCEED</button>
        </form>
    </div>

    <script>
        // --- SYSTEM CREATION ANIMATION SCRIPT ---
        const canvas = document.getElementById('identity-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let particles = [];

        class Node {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < 0 || this.x > width) this.vx *= -1;
                if(this.y < 0 || this.y > height) this.vy *= -1;
            }
        }

        // Generate Unknown Figures (Humanoid Outline)
        function drawIdentityFigure() {
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.1)';
            ctx.lineWidth = 1;
            // Central Silhouette Logic
            ctx.beginPath();
            ctx.arc(width/2, height/2 - 100, 40, 0, Math.PI * 2); // Head
            ctx.moveTo(width/2, height/2 - 60);
            ctx.lineTo(width/2, height/2 + 100); // Body
            ctx.stroke();
        }

        function init() {
            particles = [];
            for(let i=0; i<80; i++) particles.push(new Node());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            drawIdentityFigure();
            
            particles.forEach(p => {
                p.update();
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.fillRect(p.x, p.y, 2, 2);

                particles.forEach(p2 => {
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if(dist < 120) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dist/120})`;
                        ctx.lineWidth = 0.2;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; init(); });
        init(); animate();

        // --- FIREBASE LOGIC ---
        const firebaseConfig = {
            apiKey: "AIzaSyCxgc_NttnhW4weri20wnuC98xgMDHTD9k",
            authDomain: "helphandglobal.firebaseapp.com",
            projectId: "helphandglobal",
            storageBucket: "helphandglobal.firebasestorage.app",
            messagingSenderId: "286256403331",
            appId: "1:286256403331:web:8f8eea05d8db9bba25dcb6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (user) {
                if(!document.getElementById('fullName').value) {
                    document.getElementById('fullName').value = user.displayName || "";
                }
            } else {
                window.location.href = 'index.html'; 
            }
        });

        document.getElementById('kycForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-dna fa-spin"></i> SYSTEM SYNCING...';
            btn.disabled = true;

            const userData = {
                uid: auth.currentUser.uid,
                email: auth.currentUser.email,
                name: document.getElementById('fullName').value,
                father: document.getElementById('fatherName').value,
                mother: document.getElementById('motherName').value,
                pan: document.getElementById('panNo').value.toUpperCase(),
                aadhaar: document.getElementById('aadhaarNo').value,
                acc: document.getElementById('accNo').value,
                ifsc: document.getElementById('ifscCode').value.toUpperCase(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("investor_kyc").doc(auth.currentUser.uid).set(userData);
                localStorage.setItem('hhg_user', JSON.stringify(userData));
                window.location.href = 'dashboard.html'; 
            } catch (error) {
                alert("Identity Protocol Failed: " + error.message);
                btn.innerHTML = 'AUTHENTICATE & PROCEED';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
