<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Helphand Global | Strategic Financial Solutions</title>
    
    <meta name="description" content="Secure portal for exclusive financial advisory and wealth management.">
    <meta name="keywords" content="Helphand Global, Investment, Bonds, Financial Solutions">

    <link rel="icon" type="image/png" href="my-logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-bg: #020509;
            --panel-bg: rgba(6, 15, 25, 0.97);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--dark-bg);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            touch-action: none; /* Mobile scroll prevent karne ke liye animation par */
        }

        #network-canvas { position: absolute; top: 0; left: 0; z-index: 0; }

        .login-box {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            padding: 50px 35px;
            border-radius: 2px;
            width: 340px;
            z-index: 10;
            border: 1px solid rgba(0, 242, 255, 0.2);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            position: relative;
        }

        /* Robotic Corners */
        .login-box::before, .login-box::after {
            content: ''; position: absolute; width: 30px; height: 30px;
            border-color: var(--neon-blue); border-style: solid;
        }
        .login-box::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
        .login-box::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

        .logo-img { width: 80px; margin-bottom: 20px; }
        .logo { font-weight: bold; font-size: 22px; color: var(--neon-blue); letter-spacing: 2px; }
        .logo span { color: #8892b0; }

        h3 { color: white; font-weight: 300; margin-top: 20px; font-size: 18px; }
        .instruction { font-size: 11px; color: #8892b0; margin-bottom: 30px; line-height: 1.6; }

        .google-btn {
            background: white; color: #333; width: 100%; padding: 14px; 
            border-radius: 4px; border: none; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px; 
            font-size: 14px; transition: 0.3s;
        }

        .google-btn:hover { background: #f1f1f1; transform: translateY(-2px); }

        .footer-note { font-size: 9px; color: #495670; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="network-canvas"></canvas>

    <div class="login-box">
        <img src="my-logo.png" class="logo-img" alt="HHG Logo">
        <div class="logo">HELPHAND <span>GLOBAL</span></div>
        <h3>Secure Investor Login</h3>
        <p class="instruction">Identity verification via Google encrypted protocols is mandatory for global consultancy access.</p>
        
        <button class="google-btn" id="loginBtn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18">
            Sign in with Google
        </button>

        <p class="footer-note">© 2026 HelpHand Global Security Protocol</p>
    </div>

    <script>
        // --- YOUR FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCxgc_NttnhW4weri20wnuC98xgMDHTD9k",
            authDomain: "helphandglobal.firebaseapp.com",
            projectId: "helphandglobal",
            storageBucket: "helphandglobal.firebasestorage.app",
            messagingSenderId: "286256403331",
            appId: "1:286256403331:web:8f8eea05d8db9bba25dcb6",
            measurementId: "G-STW69DB8VH"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function googleLogin() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';
            btn.disabled = true;
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then((result) => { window.location.href = 'home.html'; })
                .catch((error) => {
                    alert("Auth Failed ! please try again" )
                    btn.innerHTML = 'Sign in with Google';
                    btn.disabled = false;
                });
        }

        // --- TOUCH & MOUSE INTERACTIVE ANIMATION ---
        const canvas = document.getElementById('network-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let interaction = { x: null, y: null, radius: 120 };

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Mouse Events
        window.addEventListener('mousemove', (e) => { interaction.x = e.x; interaction.y = e.y; });
        // Touch Events (For Mobile Finger)
        window.addEventListener('touchstart', (e) => { interaction.x = e.touches[0].clientX; interaction.y = e.touches[0].clientY; });
        window.addEventListener('touchmove', (e) => { interaction.x = e.touches[0].clientX; interaction.y = e.touches[0].clientY; });
        window.addEventListener('touchend', () => { interaction.x = null; interaction.y = null; });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.dx = (Math.random() - 0.5) * 1.5;
                this.dy = (Math.random() - 0.5) * 1.5;
                this.size = 1.5;
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                
                // Interact with Finger/Mouse
                if (interaction.x != null) {
                    let dx = interaction.x - this.x;
                    let dy = interaction.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < interaction.radius) {
                        if (interaction.x < this.x) this.x += 4; else this.x -= 4;
                        if (interaction.y < this.y) this.y += 4; else this.y -= 4;
                    }
                }

                this.x += this.dx; this.y += this.dy;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 242, 255, 0.6)';
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            let count = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < count; i++) particles.push(new Particle());
        }

        function connect() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dist = ((particles[a].x - particles[b].x)**2) + ((particles[a].y - particles[b].y)**2);
                    if (dist < 15000) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${1 - dist/15000})`;
                        ctx.lineWidth = 0.6;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => p.update());
            connect();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });

        init(); animate();
    </script>
</body>
</html>
