<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Settlement | HelpHand Global Reserve</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --gold: #59c5b3; --bg: #020c1b; --panel: #112240; --text: #e6f1ff; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); margin: 0; padding: 10px; }
        .checkout-box { max-width: 500px; margin: 20px auto; background: var(--panel); padding: 30px; border-radius: 15px; border: 1px solid #233554; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .payment-card { background: #0a192f; padding: 20px; border-radius: 12px; border: 1px solid var(--gold); margin: 20px 0; }
        .pay-btn { background: var(--gold); color: #000; width: 100%; padding: 18px; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .qr-placeholder { background: white; padding: 10px; width: 160px; height: 160px; margin: 15px auto; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin-top: 15px; background: #0a192f; border: 1px solid var(--gold); color: white; border-radius: 8px; box-sizing: border-box; text-align: center; }
        #success-ui { display: none; }
    </style>
</head>
<body>

    <div id="checkout-ui" class="checkout-box">
        <h2 style="color: var(--gold);">FINAL SETTLEMENT</h2>
        <p style="color: #8892b0; font-size: 13px;">Complete the allocation to activate your Bond.</p>
        
        <div class="payment-card">
            <p style="color: #8892b0; font-size: 12px; margin: 0;">ALLOCATION AMOUNT</p>
            <p style="color: var(--gold); font-size: 32px; font-weight: 800; margin: 10px 0;">$<span id="display-amt">0</span></p>
            <p id="inr-converted" style="color: #4ade80; font-weight: bold; margin: 0;">₹0.00</p>
        </div>

        <button class="pay-btn" onclick="payViaIntent()">PAY VIA UPI (GPay/PhonePe)</button>
        
        <p style="margin: 15px 0; color: #8892b0; font-size: 12px;">— OR SCAN QR CODE —</p>
        
        <div class="qr-placeholder">
            <img id="qr-img" src="" alt="Scan to Pay" style="width: 100%;">
        </div>

        <input type="text" id="utr-value" placeholder="Enter 12-Digit Transaction ID (UTR)" maxlength="12">
        <button class="pay-btn" style="background: #128c7e; color: white; margin-top: 15px;" onclick="submitFinal()">VERIFY & GENERATE BOND</button>

        <p style="font-size: 11px; color: #8892b0; margin-top: 15px;">*Once verified, your certificate will be generated automatically.</p>
    </div>

    <div id="success-ui">
        <div class="checkout-box" style="border-color: #4ade80;">
            <h2 style="color: #4ade80;">SETTLEMENT SUCCESSFUL</h2>
            <div id="bond-content" style="background: #fff; color: #000; padding: 25px; text-align: left; border: 4px double #d4af37; font-family: 'Times New Roman', serif;">
                <h3 style="text-align: center; text-decoration: underline;">OFFICIAL INVESTMENT BOND</h3>
                <p><strong>INVESTOR:</strong> <span id="pdf-name"></span></p>
                <p><strong>AMOUNT:</strong> $<span id="pdf-amt"></span></p>
                <p><strong>BOND ID:</strong> <span id="pdf-id"></span></p>
                <p><strong>STATUS:</strong> OFFICIALLY VERIFIED</p>
            </div>
            <button class="pay-btn" onclick="downloadPDF()" style="margin-top: 25px;">DOWNLOAD PDF BOND</button>
        </div>
    </div>

    <script>
        // Data Load from LocalStorage (Jo KYC page ne save kiya hoga)
        const user = JSON.parse(localStorage.getItem('hhg_user')) || {name: "Valued Investor"};
        const plan = JSON.parse(localStorage.getItem('hhg_plan')) || { investAmt: 100 }; 
        
        let numericDollar = parseFloat(plan.investAmt) || 0;
        let inrAmount = numericDollar * 84;
        let upiID = "khanajaz0139@oksbi"; 

        document.getElementById('display-amt').innerText = numericDollar;
        document.getElementById('inr-converted').innerText = "₹" + inrAmount.toLocaleString('en-IN');

        // Dynamic QR Generator
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=upi://pay?pa=${upiID}%26pn=HelpHandGlobal%26am=${inrAmount}%26cu=INR`;
        document.getElementById('qr-img').src = qrUrl;

        function payViaIntent() {
            window.location.href = `upi://pay?pa=${upiID}&pn=HelpHandGlobal&am=${inrAmount}&cu=INR`;
        }

        function submitFinal() {
            const utr = document.getElementById('utr-value').value;
            if(utr.length < 10) {
                alert("Please enter a valid Transaction ID / UTR.");
                return;
            }

            // UI Switch
            document.getElementById('checkout-ui').style.display = 'none';
            document.getElementById('success-ui').style.display = 'block';
            
            // Fill Bond
            document.getElementById('pdf-name').innerText = user.name.toUpperCase();
            document.getElementById('pdf-amt').innerText = numericDollar;
            document.getElementById('pdf-id').innerText = "HHG-BOND-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("times", "bold");
            doc.text("HELPHAND GLOBAL RESERVE BOND", 105, 20, {align: 'center'});
            doc.setFont("times", "normal");
            doc.text(`Investor: ${user.name.toUpperCase()}`, 20, 40);
            doc.text(`Capital: $${numericDollar}`, 20, 50);
            doc.text(`BOND ID: ${document.getElementById('pdf-id').innerText}`, 20, 60);
            doc.save(`HelpHand_Global_Bond.pdf`);
        }
    </script>
</body>
</html>
